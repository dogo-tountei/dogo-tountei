<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="有限会社 東雲亭の公式サイト。ホテル東雲亭、道後焼き鳥一、道後味処二郎をご案内します。"
    />
    <title>有限会社 東雲亭｜道後で泊まる、食べる、くつろぐ。</title>
    <style>
      :root {
        --bg: #100d0a;
        --ink: #f7efe2;
        --muted: #d8c8b2;
        --gold: #c78a3d;
        --gold-soft: #f4d29c;
        --red: #8f241f;
        --card: rgba(31, 25, 18, 0.88);
        --line: rgba(244, 210, 156, 0.24);
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 10%, rgba(199, 138, 61, 0.22), transparent 28%),
          radial-gradient(circle at 88% 16%, rgba(143, 36, 31, 0.2), transparent 26%),
          linear-gradient(180deg, #17110d 0%, #0d0b09 58%, #090807 100%);
        font-family: "Yu Mincho", "Hiragino Mincho ProN", "YuMincho", serif;
        line-height: 1.8;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .hero {
        position: relative;
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: 40px 24px 70px;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 18px;
        border: 1px solid rgba(244, 210, 156, 0.18);
        pointer-events: none;
      }

      .hero::after {
        content: "東雲亭";
        position: absolute;
        right: -0.15em;
        bottom: -0.42em;
        color: rgba(255, 255, 255, 0.035);
        font-size: clamp(110px, 22vw, 280px);
        letter-spacing: 0.08em;
        line-height: 1;
        pointer-events: none;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 54px;
        font-family: system-ui, -apple-system, "Yu Gothic", sans-serif;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        letter-spacing: 0.18em;
        font-size: 13px;
      }
