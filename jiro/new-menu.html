<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>道後味処 二郎 | 新メニュー</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d1d1b;
      --muted: #666056;
      --paper: #fbfaf7;
      --line: #ddd7cb;
      --gold: #b8892f;
      --green: #23624c;
      --red: #9e2f2b;
      --charcoal: #23211f;
      --shadow: 0 18px 50px rgba(29, 29, 27, .13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", "Times New Roman", serif;
      background:
        linear-gradient(90deg, rgba(35, 98, 76, .07), transparent 30%, rgba(158, 47, 43, .06)),
        var(--paper);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100vh;
    }

    .hero {
      display: grid;
      min-height: 74vh;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr);
      border-bottom: 1px solid var(--line);
      background: #161514;
    }

    .hero-photo {
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 52%, rgba(22, 21, 20, .72));
      pointer-events: none;
    }

    .hero-copy {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      padding: clamp(28px, 5vw, 74px);
      color: #fffdf8;
      background:
        radial-gradient(circle at 80% 12%, rgba(184, 137, 47, .18), transparent 32%),
        linear-gradient(160deg, #25221f, #151414);
    }

    .store {
      margin: 0;
      font-size: clamp(18px, 2vw, 25px);
      color: #dac69d;
      line-height: 1.25;
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 7vw, 92px);
      line-height: .95;
      font-weight: 700;
    }

    .lead {
      max-width: 32em;
      margin: 0;
      color: #e9e1d1;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: clamp(15px, 1.6vw, 18px);
      line-height: 1.9;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 13px;
      color: #f8f0df;
    }

    .hero-meta li {
      border: 1px solid rgba(248, 240, 223, .28);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      white-space: nowrap;
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .page-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      border: 1px solid rgba(248, 240, 223, .42);
      color: #fffdf8;
      text-decoration: none;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 13px;
      letter-spacing: .08em;
      transition: .2s ease;
    }

    .page-link.primary {
      background: var(--red);
      border-color: var(--red);
    }

    .page-link:hover {
      background: #fffdf8;
      color: var(--charcoal);
    }

    main {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: clamp(30px, 5vw, 64px) 0 72px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 24px;
    }

    .section-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.1;
    }

    .section-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    .filters {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .76);
    }

    .filter {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 8px 13px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 14px;
    }

    .filter[aria-pressed="true"] {
      background: var(--charcoal);
      color: #fffdf8;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .dish {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf9;
      box-shadow: var(--shadow);
    }

    .dish[hidden] {
      display: none;
    }

    .dish figure {
      margin: 0;
    }

    .dish-image {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #eee8dc;
    }

    .dish-image.wide {
      aspect-ratio: 16 / 10;
    }

    .dish img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s ease;
    }

    .dish:hover img {
      transform: scale(1.035);
    }

    .dish-body {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .dish-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .dish h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .tag {
      flex: 0 0 auto;
      border-left: 3px solid var(--gold);
      padding-left: 8px;
      color: var(--muted);
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 12px;
      line-height: 1.4;
    }

    .dish p {
      margin: 0;
      color: #4d4841;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 14px;
      line-height: 1.75;
    }

    .accent {
      width: 52px;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--green), var(--red));
    }

    .choice-group {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      width: fit-content;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f5f1e8;
    }

    .choice-button {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      padding: 7px 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 13px;
      line-height: 1.2;
    }

    .choice-button[aria-pressed="true"] {
      background: var(--green);
      color: #fffdf8;
    }

    .notice {
      margin-top: 28px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-photo {
        min-height: 48vh;
      }

      .hero-photo::after {
        background: linear-gradient(0deg, rgba(22, 21, 20, .78), transparent 54%);
      }

      .hero-copy {
        padding-top: 32px;
      }

      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .hero {
        min-height: auto;
      }

      .hero-photo {
        min-height: 54vh;
      }

      .toolbar {
        display: block;
      }

      .filters {
        margin-top: 18px;
        width: 100%;
      }

      .filter {
        flex: 1 1 auto;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }

      main {
        width: min(100% - 24px, 560px);
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .hero {
        min-height: 0;
        grid-template-columns: 1fr 1fr;
        break-inside: avoid;
      }

      .filters {
        display: none;
      }

      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dish {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-photo" aria-hidden="true">
        <img src="jiro-menu-assets/kisu-tempura.jpg" alt="">
      </div>
      <div class="hero-copy">
        <p class="store">道後味処 二郎</p>
        <h1>新メニュー</h1>
        <p class="lead">揚げたての天ぷら、涼やかなハモの湯引き、季節の小鉢。ひと皿ごとの香りと食感を、写真で選びやすくまとめました。</p>
        <ul class="hero-meta" aria-label="新メニューの特徴">
          <li>季節のおすすめ</li>
          <li>天ぷら</li>
          <li>ハモ料理</li>
          <li>一品料理</li>
        </ul>
        <div class="hero-links">
          <a class="page-link primary" href="https://dogo-tountei.com/jiro/">二郎ページへ戻る</a>
          <a class="page-link" href="https://dogo-tountei.com/">東雲亭トップへ</a>
        </div>
      </div>
    </header>

    <main>
      <div class="toolbar">
        <div>
          <h2 class="section-title">本日のおすすめ</h2>
          <p class="section-note">写真を見ながら選べる、二郎の新しい一品。</p>
        </div>
        <div class="filters" aria-label="料理カテゴリ">
          <button class="filter" type="button" data-filter="all" aria-pressed="true">すべて</button>
          <button class="filter" type="button" data-filter="tempura" aria-pressed="false">天ぷら</button>
          <button class="filter" type="button" data-filter="hamo" aria-pressed="false">ハモ</button>
          <button class="filter" type="button" data-filter="ippin" aria-pressed="false">一品</button>
        </div>
      </div>

      <section class="menu-grid" aria-label="新メニュー一覧">
        <article class="dish" data-category="tempura">
          <figure>
            <div class="dish-image">
              <img src="jiro-menu-assets/kisu-tempura.jpg" alt="キスの天ぷら">
            </div>
            <figcaption class="dish-body">
              <div class="dish-top">
                <h3>キスの天ぷら</h3>
                <span class="tag">天ぷら</span>
              </div>
              <div class="accent" aria-hidden="true"></div>
              <p>ふっくら軽い白身を、薄衣でさくっと。レモンと塩で香りよく楽しめます。</p>
            </figcaption>
          </figure>
        </article>

        <article class="dish" data-category="tempura hamo">
          <figure>
            <div class="dish-image">
              <img src="jiro-menu-assets/hamo-tempura.jpg" alt="ハモ天ぷら">
            </div>
            <figcaption class="dish-body">
              <div class="dish-top">
                <h3>ハモ天ぷら</h3>
                <span class="tag">天ぷら / ハモ</span>
              </div>
              <div class="accent" aria-hidden="true"></div>
              <p>淡白な旨みをふんわり揚げた季節の味。まずは塩でどうぞ。</p>
            </figcaption>
          </figure>
        </article>

        <article class="dish" data-category="tempura ippin">
          <figure>
            <div class="dish-image wide">
              <img src="jiro-menu-assets/gobou-ten.jpg" alt="ゴボウ天">
            </div>
            <figcaption class="dish-body">
              <div class="dish-top">
                <h3>ゴボウ天</h3>
                <span class="tag">天ぷら / 一品</span>
              </div>
              <div class="accent" aria-hidden="true"></div>
              <p>香ばしいごぼうの歯ざわりが心地よい、酒の肴にも合う一皿です。</p>
            </figcaption>
          </figure>
        </article>

        <article class="dish" data-category="hamo ippin">
          <figure>
            <div class="dish-image wide">
              <img class="choice-image" src="jiro-menu-assets/hamo-yubiki-sumiso.jpg" alt="ハモ湯引き 酢味噌">
            </div>
            <figcaption class="dish-body">
              <div class="dish-top">
                <h3>ハモ湯引き</h3>
                <span class="tag">ハモ / 一品</span>
              </div>
              <div class="accent" aria-hidden="true"></div>
              <div class="choice-group" aria-label="ハモ湯引きの味を選択">
                <button
                  class="choice-button"
                  type="button"
                  aria-pressed="true"
                  data-choice-image="jiro-menu-assets/hamo-yubiki-sumiso.jpg"
                  data-choice-alt="ハモ湯引き 酢味噌"
                  data-choice-text="涼しげなハモに、まろやかな酢味噌を添えて。夏らしい爽やかな味わい。"
                >酢味噌</button>
                <button
                  class="choice-button"
                  type="button"
                  aria-pressed="false"
                  data-choice-image="jiro-menu-assets/hamo-yubiki-ume.jpg"
                  data-choice-alt="ハモ湯引き 梅"
                  data-choice-text="梅の酸味で、ハモの上品な甘みをきりっと。暑い日にも箸が進みます。"
                >梅</button>
              </div>
              <p class="choice-text">涼しげなハモに、まろやかな酢味噌を添えて。夏らしい爽やかな味わい。</p>
            </figcaption>
          </figure>
        </article>

        <article class="dish" data-category="ippin">
          <figure>
            <div class="dish-image">
              <img src="jiro-menu-assets/kazunoko.jpg" alt="数の子">
            </div>
            <figcaption class="dish-body">
              <div class="dish-top">
                <h3>数の子</h3>
                <span class="tag">一品</span>
              </div>
              <div class="accent" aria-hidden="true"></div>
              <p>ぷちぷちとした食感とだしの旨み。最初の一品にも、締め前の肴にも。</p>
            </figcaption>
          </figure>
        </article>
      </section>

      <p class="notice">価格・入荷状況は季節や仕入れにより変わる場合があります。店内スタッフまでお声がけください。</p>
    </main>
  </div>

  <script>
    const buttons = document.querySelectorAll(".filter");
    const dishes = document.querySelectorAll(".dish");
    const choiceGroups = document.querySelectorAll(".choice-group");

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const filter = button.dataset.filter;

        buttons.forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });

        dishes.forEach((dish) => {
          const categories = dish.dataset.category.split(" ");
          dish.hidden = filter !== "all" && !categories.includes(filter);
        });
      });
    });

    choiceGroups.forEach((group) => {
      const dish = group.closest(".dish");
      const image = dish.querySelector(".choice-image");
      const text = dish.querySelector(".choice-text");
      const choiceButtons = group.querySelectorAll(".choice-button");

      choiceButtons.forEach((button) => {
        button.addEventListener("click", () => {
          choiceButtons.forEach((item) => {
            item.setAttribute("aria-pressed", String(item === button));
          });

          image.src = button.dataset.choiceImage;
          image.alt = button.dataset.choiceAlt;
          text.textContent = button.dataset.choiceText;
        });
      });
    });
  </script>
</body>
</html>
